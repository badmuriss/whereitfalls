services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: whereitfalls
      POSTGRES_USER: wif
      POSTGRES_PASSWORD: wif
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wif -d whereitfalls"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      network: host
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://wif:wif@db:5432/whereitfalls
    ports:
      - "8002:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      network: host
    environment:
      VITE_API_BASE_URL: http://localhost:8002
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
